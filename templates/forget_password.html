<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>
    <style>
        body { font-family: Arial, sans-serif; min-height: 100vh; margin: 0; background: url('/static/images/MEDICAL-INSURANCE.jpg') no-repeat center center fixed; background-size: cover; display: flex; justify-content: center; align-items: center; }
        .container { background: rgba(255,255,255,0.90); padding: 30px; border-radius: 10px; width: 380px; }
        label { display: block; margin-top: 12px; font-weight: bold; }
        input { width: 100%; padding: 6px; margin-top: 4px; box-sizing: border-box; }
        button { margin-top: 20px; padding: 10px; background: #2d6be4; color: white; border: none; cursor: pointer; width: 100%; }
        #msg { margin-top: 15px; font-size: 1em; }
        .link { margin-top: 12px; text-align: center; }
        .link a { color: #2d6be4; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Forgot Password</h2>
        <form id="forgotForm">
            <label>Username <input type="text" name="user_name" required></label>
            <label>Date of Birth <input type="date" name="dob" required></label>
            <label>New Password <input type="password" name="new_password" required></label>
            <button type="submit">Reset Password</button>
        </form>
        <div id="msg"></div>
        <div class="link"><a href="/login_page">Back to Login</a></div>
    </div>
    <script>
        document.getElementById("forgotForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            const res = await fetch("/forget_password", { method: "POST", body: new FormData(this) });
            const data = await res.json();
            const msg = document.getElementById("msg");
            msg.textContent = data.message;
            msg.style.color = data.status === "success" ? "green" : "red";
            if (data.status === "success") setTimeout(() => window.location.href = "/login_page", 1500);
        });
    </script>
</body>
</html>
