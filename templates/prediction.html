<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Medical Insurance Predictor</title>
    <style>
        body { font-family: Arial, sans-serif; min-height: 100vh; margin: 0; background: url('/static/images/MEDICAL-INSURANCE.jpg') no-repeat center center fixed; background-size: cover; display: flex; justify-content: center; align-items: center; }
        .container { background: rgba(255,255,255,0.88); padding: 30px; border-radius: 10px; width: 420px; }
        label { display: block; margin-top: 12px; font-weight: bold; }
        input, select { width: 100%; padding: 6px; margin-top: 4px; box-sizing: border-box; }
        button { margin-top: 20px; padding: 10px 20px; background: #2d6be4; color: white; border: none; cursor: pointer; width: 100%; }
        #result { margin-top: 20px; font-size: 1.2em; color: green; }
        #error { margin-top: 10px; color: red; }
        .logout { text-align: right; margin-bottom: 10px; }
        .logout a { color: #c0392b; text-decoration: none; font-size: 0.9em; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logout"><a onclick="logout()">Logout</a></div>
        <h2>Medical Insurance Charge Predictor</h2>
        <form id="predictForm">
            <label>Age <input type="number" name="age" min="1" required></label>
            <label>BMI <input type="number" name="bmi" step="0.01" min="0" required></label>
            <label>Children <input type="number" name="children" min="0" required></label>
            <label>Gender <select name="gender" id="gender"></select></label>
            <label>Smoker <select name="smoker" id="smoker"></select></label>
            <label>Region <select name="region" id="region"></select></label>
            <button type="submit">Predict Charges</button>
        </form>
        <div id="error"></div>
        <div id="result"></div>
    </div>
    <script>
        const token = new URLSearchParams(window.location.search).get("token") || sessionStorage.getItem("access_token");
        if (!token) window.location.href = "/login_page";

        async function loadOptions(url, selectId) {
            const res = await fetch(url, { headers: { "Authorization": "Bearer " + token } });
            if (res.status === 401) { window.location.href = "/login_page"; return; }
            const options = await res.json();
            const select = document.getElementById(selectId);
            options.forEach(opt => {
                const el = document.createElement("option");
                el.value = opt; el.textContent = opt;
                select.appendChild(el);
            });
        }

        loadOptions("/gender_options", "gender");
        loadOptions("/smoker_options", "smoker");
        loadOptions("/region_options", "region");

        document.getElementById("predictForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            const res = await fetch("/predict_charges", {
                method: "POST",
                headers: { "Authorization": "Bearer " + token },
                body: new FormData(this)
            });
            if (res.status === 401) {
                document.getElementById("error").textContent = "Session expired. Please login again.";
                setTimeout(() => window.location.href = "/login_page", 1500);
                return;
            }
            const data = await res.json();
            document.getElementById("result").textContent = "Predicted Charges: $" + data["Predicted Charges"].toFixed(2);
        });

        function logout() {
            sessionStorage.removeItem("access_token");
            window.location.href = "/login_page";
        }
    </script>
</body>
</html>
